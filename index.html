<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Quiz - Philippines Reporting Standards</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #quiz-container {
            background: white;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }

        .question { margin-bottom: 25px; display: none; }
        .question.active { display: block; }

        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; color: #333; line-height: 1.5; }

        .options-list { list-style: none; padding: 0; }

        .option-item {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover { border-color: var(--secondary); background: #f0f8ff; }

        .option-item.selected { background: var(--secondary); color: white; border-color: var(--secondary); }

        .controls { margin-top: 20px; display: flex; gap: 10px; }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-submit { background: var(--success); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #results { margin-top: 20px; font-weight: bold; font-size: 1.2rem; display: none; }
        .score-box { padding: 20px; background: #e8f4fd; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>Financial Reporting Quiz</h1>
    <div id="quiz-body">
        </div>

    <div class="controls">
        <button id="next-btn" class="btn-next">Next Question</button>
        <button id="submit-btn" class="btn-submit" style="display:none;">Submit Quiz</button>
    </div>

    <div id="results"></div>
</div>

<script>
    // Your Data Input
    const quizData = [
        { q: "Which statement is true for financial reporting in the Philippines? (I) Current before non-current (II) Order of Notes (III) 'Reserves' definition.", options: ["a. I and II only", "b. I and III only", "c. II and III only", "d. I, II and III"], correct: "b" },
        { q: "An entity purchases a building via equity shares and debentures. Treatment in Cash Flow?", options: ["a. Investing and Financing outflows", "b. Mixture of Investing/Financing", "c. Non-cash; disclosed in notes", "d. Ignore totally"], correct: "c" },
        { q: "The scope of PAS 39 includes all of the following except:", options: ["a. Financial Assets", "b. Financial Liabilities", "c. Equity instruments issued by the entity", "d. Net-settled non-financial contracts"], correct: "c" },
        { q: "Deposits in foreign countries subject to exchange restrictions should be:", options: ["a. Current exchange rate / Current asset", "b. Historical rate / Noncurrent asset", "c. Current exchange rate / Noncurrent asset", "d. Historical rate / Current asset"], correct: "c" },
        { q: "Proper accounting for credit card sales (Affiliated vs Not Affiliated with bank):", options: ["a. Sale on account / Cash sales", "b. Sale on account / Sale on account", "c. Cash sale / Cash sale", "d. Cash sale / Sale on account"], correct: "d" },
        { q: "Expected losses from firm/non-cancellable purchase commitments should be:", options: ["a. Recognized as Loss/Estimated Liability", "b. Disclosed in notes", "c. Ignored", "d. Charged to retained earnings"], correct: "a" },
        { q: "Delta Corp purchased 7,400 shares of Maiden Co. (actively traded). Method used?", options: ["a. Cost method", "b. Equity method", "c. Cost method (FV valuation)", "d. Market value method (FV valuation)"], correct: "c" },
        { q: "True regarding Investment Property: (I) Measured at cost (II) Transaction costs included (III) Choice of Fair Value or Cost model.", options: ["a. I and II only", "b. I and III only", "c. II and III only", "d. I, II and III"], correct: "d" },
        { q: "In determining FV of biological assets, consider:", options: ["a. Price change", "b. Physical change", "c. Both price and physical change", "d. Neither"], correct: "c" },
        { q: "Impact of Treasury Stock acquisition (cost > par/issue, but < book value) on TSE and NBV:", options: ["a. TSE: Decrease; NBV: Increase", "b. TSE: Increase; NBV: Decrease", "c. TSE: Decrease; NBV: Decrease", "d. TSE: Increase; NBV: Increase"], correct: "a" },
        { q: "Measurement basis for non-monetary exchange (Commercial Substance vs No Commercial Substance):", options: ["a. FV of asset given / Carrying amt of asset given", "b. Carrying amt given / Carrying amt received", "c. Carrying amt received / FV of asset received", "d. FV of asset given / FV of asset given"], correct: "a" },
        { q: "Which statement concerning borrowing costs is FALSE?", options: ["a. Includes interest, overdrafts, etc.", "b. Incurred in relation to borrowed funds", "c. Benchmark treatment is to capitalize", "d. Includes exchange differences"], correct: "c" },
        { q: "Under PAS 11, additional revenue from contract variation is allowed if:", options: ["a. Negotiations advanced/probable acceptance", "b. Performance standards exceeded", "c. Probable approval and reliably measured", "d. Probable approval regardless of measurement"], correct: "c" },
        { q: "Under IAS 20, recognizing intangible assets from government grants (Free/Nominal):", options: ["a. I only (Fair Value)", "b. Either I (FV) or II (Nominal)", "c. II only (Nominal)", "d. Neither"], correct: "b" },
        { q: "Arguments supporting the 'Income Approach' for grants include these EXCEPT:", options: ["a. Earned through compliance", "b. Receipts from non-shareholders", "c. Grant is incentive without costs", "d. Extension of fiscal policies"], correct: "c" }
    ];

    let currentQuestionIndex = 0;
    let userAnswers = [];

    const quizBody = document.getElementById('quiz-body');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    const resultsDiv = document.getElementById('results');

    function loadQuiz() {
        quizData.forEach((data, index) => {
            const qDiv = document.createElement('div');
            qDiv.classList.add('question');
            if(index === 0) qDiv.classList.add('active');
            
            qDiv.innerHTML = `
                <div class="question-text">${index + 1}. ${data.q}</div>
                <ul class="options-list">
                    ${data.options.map((opt, i) => `
                        <li class="option-item" onclick="selectOption(${index}, ${i})">
                            ${opt}
                        </li>
                    `).join('')}
                </ul>
            `;
            quizBody.appendChild(qDiv);
        });
    }

    window.selectOption = (qIdx, oIdx) => {
        const questions = document.querySelectorAll('.question');
        const options = questions[qIdx].querySelectorAll('.option-item');
        options.forEach(opt => opt.classList.remove('selected'));
        options[oIdx].classList.add('selected');
        
        const letter = String.fromCharCode(97 + oIdx); // converts 0 to 'a', 1 to 'b'
        userAnswers[qIdx] = letter;
    };

    nextBtn.addEventListener('click', () => {
        const questions = document.querySelectorAll('.question');
        questions[currentQuestionIndex].classList.remove('active');
        currentQuestionIndex++;
        
        if(currentQuestionIndex < questions.length) {
            questions[currentQuestionIndex].classList.add('active');
        }
        
        if(currentQuestionIndex === questions.length - 1) {
            nextBtn.style.display = 'none';
            submitBtn.style.display = 'block';
        }
    });

    submitBtn.addEventListener('click', () => {
        let score = 0;
        quizData.forEach((data, index) => {
            if(userAnswers[index] === data.correct) score++;
        });

        quizBody.style.display = 'none';
        submitBtn.style.display = 'none';
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = `
            <div class="score-box">
                <h2>Quiz Complete!</h2>
                <p>You scored <strong>${score}</strong> out of ${quizData.length}</p>
                <p>Percentage: ${(score/quizData.length * 100).toFixed(2)}%</p>
                <button onclick="location.reload()" style="background:var(--secondary); color:white; margin-top:10px;">Retry Quiz</button>
            </div>
        `;
    });

    loadQuiz();
</script>

</body>
</html>
