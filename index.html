<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Quiz - Instant Feedback</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --light: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); padding: 20px; display: flex; justify-content: center; }
        #quiz-container { background: white; max-width: 800px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .question { display: none; }
        .question.active { display: block; }
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; line-height: 1.5; }

        .options-list { list-style: none; padding: 0; }
        .option-item {
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 12px 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Feedback Colors */
        .option-item.correct { background-color: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .option-item.wrong { background-color: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }
        .option-item.disabled { pointer-events: none; }

        .controls { margin-top: 20px; display: flex; gap: 10px; flex-direction: column; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        #check-btn { background: var(--secondary); }
        #next-btn { background: var(--primary); display: none; }
        #results { margin-top: 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1 id="title">Financial Reporting Quiz</h1>
    <div id="quiz-body"></div>

    <div class="controls">
        <button id="check-btn" onclick="checkAnswer()">Check Answer</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
    </div>

    <div id="results"></div>
</div>

<script>
    const quizData = [
        { q: "Which statement is true for financial reporting in the Philippines? (I) Current before non-current (II) Order of Notes (III) 'Reserves' definition.", options: ["a", "b", "c", "d"], correct: "b", fullOptions: ["a. I and II only", "b. I and III only", "c. II and III only", "d. I, II and II"] },
        { q: "An entity purchases a building via equity shares and debentures. Treatment in Cash Flow?", options: ["a", "b", "c", "d"], correct: "c", fullOptions: ["a. Investing and Financing outflows", "b. Mixture of Investing/Financing", "c. Non-cash; disclosed in notes", "d. Ignore totally"] },
        // ... Add more here following the same structure
    ];

    // Note: I simplified the quizData object above for the code block, 
    // but you should use your full question text from the previous version.

    let currentIdx = 0;
    let score = 0;
    let selectedLetter = null;

    function loadQuestion() {
        const qData = quizData[currentIdx];
        const quizBody = document.getElementById('quiz-body');
        
        quizBody.innerHTML = `
            <div class="question active">
                <div class="question-text">${currentIdx + 1}. ${qData.q}</div>
                <ul class="options-list">
                    ${qData.fullOptions.map((opt, i) => `
                        <li class="option-item" id="opt-${i}" onclick="select(${i}, '${String.fromCharCode(97+i)}')">
                            ${opt}
                        </li>
                    `).join('')}
                </ul>
            </div>
        `;
        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        selectedLetter = null;
    }

    window.select = (index, letter) => {
        const options = document.querySelectorAll('.option-item');
        options.forEach(o => o.style.borderColor = '#ddd');
        document.getElementById(`opt-${index}`).style.borderColor = 'var(--secondary)';
        selectedLetter = letter;
    };

    window.checkAnswer = () => {
        if (!selectedLetter) return alert("Please select an answer first!");

        const qData = quizData[currentIdx];
        const options = document.querySelectorAll('.option-item');
        
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';

        options.forEach((el, i) => {
            el.classList.add('disabled');
            const letter = String.fromCharCode(97 + i);
            
            if (letter === qData.correct) {
                el.classList.add('correct'); // Highlight the right answer
            }
            if (letter === selectedLetter && selectedLetter !== qData.correct) {
                el.classList.add('wrong'); // Highlight the wrong choice if user picked it
            }
        });

        if (selectedLetter === qData.correct) score++;
    };

    window.nextQuestion = () => {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById('quiz-body').innerHTML = "";
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('title').innerText = "Quiz Results";
        const res = document.getElementById('results');
        res.style.display = 'block';
        res.innerHTML = `<h2>Score: ${score} / ${quizData.length}</h2><button onclick="location.reload()" style="background:var(--secondary)">Restart</button>`;
    }

    loadQuestion();
</script>
</body>
</html>
